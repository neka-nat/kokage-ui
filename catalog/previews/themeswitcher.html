lass="bg-accent w-2 h-4 rounded-sm"></span><span class="bg-neutral w-2 h-4 rounded-sm"></span></span><span class="flex-1 text-left text-base-content text-xs">cupcake</span></button><button data-theme="bumblebee" onclick="kokageSetTheme('bumblebee')" class="btn btn-ghost btn-sm justify-start gap-2 w-full"><span class="flex gap-0.5"><span class="bg-primary w-2 h-4 rounded-sm"></span><span class="bg-secondary w-2 h-4 rounded-sm"></span><span class="bg-accent w-2 h-4 rounded-sm"></span><span class="bg-neutral w-2 h-4 rounded-sm"></span></span><span class="flex-1 text-left text-base-content text-xs">bumblebee</span></button><button data-theme="emerald" onclick="kokageSetTheme('emerald')" class="btn btn-ghost btn-sm justify-start gap-2 w-full"><span class="flex gap-0.5"><span class="bg-primary w-2 h-4 rounded-sm"></span><span class="bg-secondary w-2 h-4 rounded-sm"></span><span class="bg-accent w-2 h-4 rounded-sm"></span><span class="bg-neutral w-2 h-4 rounded-sm"></span></span><span class="flex-1 text-left text-base-content text-xs">emerald</span></button></div></div><script>(function(){var KEY='kokage-theme';var saved=localStorage.getItem(KEY);if(saved)document.documentElement.setAttribute('data-theme',saved);window.kokageSetTheme=function(t){document.documentElement.setAttribute('data-theme',t);localStorage.setItem(KEY,t);};})();</script></div>
<script>
// Notify parent of content height for iframe auto-resize (with loop guard)
var _lastH = 0;
function notifyHeight() {
  var h = document.body.scrollHeight;
  if (h !== _lastH) {
    _lastH = h;
    window.parent.postMessage({ type: "kokage-resize", height: h }, "*");
  }
}
window.addEventListener("load", notifyHeight);
</script>
