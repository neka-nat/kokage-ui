<div><ul id="kokage-sortable-2f534670" class="list-none p-0"><li data-id="1" class="flex items-center p-2 border rounded mb-1 bg-base-100"><span class="sortable-handle cursor-grab mr-2 select-none">⠇</span><span>First item</span></li><li data-id="2" class="flex items-center p-2 border rounded mb-1 bg-base-100"><span class="sortable-handle cursor-grab mr-2 select-none">⠇</span><span>Second item</span></li><li data-id="3" class="flex items-center p-2 border rounded mb-1 bg-base-100"><span class="sortable-handle cursor-grab mr-2 select-none">⠇</span><span>Third item</span><span class="badge badge-ghost badge-sm ml-auto">New</span></li></ul><script>(function(){if(typeof Sortable==='undefined'){console.error('SortableJS not loaded');return;}var el=document.getElementById('kokage-sortable-2f534670');Sortable.create(el,{handle:".sortable-handle",ghostClass:"opacity-50",animation:150,onEnd:function(){var ids=Array.from(el.children).map(function(li){return li.dataset.id;});htmx.ajax('POST','/api/reorder',{values:{ids:JSON.stringify(ids)},swap:'none'});}});})()</script></div>
<script>
// Notify parent of content height for iframe auto-resize (with loop guard)
var _lastH = 0;
function notifyHeight() {
  var h = document.body.scrollHeight;
  if (h !== _lastH) {
    _lastH = h;
    window.parent.postMessage({ type: "kokage-resize", height: h }, "*");
  }
}
window.addEventListener("load", notifyHeight);
</script>
