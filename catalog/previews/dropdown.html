  <style>body { padding: 1rem; background: transparent; }</style>

<body>
<div class="dropdown"><div tabindex="0" role="button" class="btn m-1">Menu</div><ul tabindex="0" class="dropdown-content menu bg-base-100 rounded-box z-1 w-52 p-2 shadow"><li><a href="#">Profile</a></li><li><a href="#">Settings</a></li><li><a href="#">Logout</a></li></ul></div>
<script>
// Notify parent of content height for iframe auto-resize
function notifyHeight() {
  var h = document.documentElement.scrollHeight;
  window.parent.postMessage({ type: "kokage-resize", height: h }, "*");
}
window.addEventListener("load", notifyHeight);
new ResizeObserver(notifyHeight).observe(document.body);
</script>
</body>
