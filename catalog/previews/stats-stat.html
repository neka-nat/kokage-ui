<!DOCTYPE html>
<html lang="ja" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <style>body { padding: 1rem; background: transparent; }</style>
</head>
<body>
<div class="stats shadow"><div class="stat"><div class="stat-title">Total Users</div><div class="stat-value">31K</div><div class="stat-desc">+2.1% from last month</div></div><div class="stat"><div class="stat-title">Revenue</div><div class="stat-value">$4,200</div><div class="stat-desc">+12% from last month</div></div><div class="stat"><div class="stat-title">Active Now</div><div class="stat-value">573</div><div class="stat-desc">21 more than yesterday</div></div></div>
<script>
// Notify parent of content height for iframe auto-resize (with loop guard)
var _lastH = 0;
function notifyHeight() {
  var h = document.body.scrollHeight;
  if (h !== _lastH) {
    _lastH = h;
    window.parent.postMessage({ type: "kokage-resize", height: h }, "*");
  }
}
window.addEventListener("load", notifyHeight);
</script>
</body>
</html>
