<!DOCTYPE html>
<html lang="ja" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <style>body { padding: 1rem; background: transparent; }</style>
</head>
<body>
<div role="tablist" class="tabs tabs-lifted"><input type="radio" name="kokage-tabs" class="tab" aria-label="Tab 1" checked /><div class="tab-content p-4" role="tabpanel"><p>Content of tab 1</p></div><input type="radio" name="kokage-tabs" class="tab" aria-label="Tab 2" /><div class="tab-content p-4" role="tabpanel"><p>Content of tab 2</p></div><input type="radio" name="kokage-tabs" class="tab" aria-label="Tab 3" /><div class="tab-content p-4" role="tabpanel"><p>Content of tab 3</p></div></div>
<script>
// Notify parent of content height for iframe auto-resize
function notifyHeight() {
  var h = document.documentElement.scrollHeight;
  window.parent.postMessage({ type: "kokage-resize", height: h }, "*");
}
window.addEventListener("load", notifyHeight);
new ResizeObserver(notifyHeight).observe(document.body);
</script>
</body>
</html>
