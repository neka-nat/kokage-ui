<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 200" width="100%" height="100%">
  <defs>
    <!-- Gradients -->
    <linearGradient id="treeGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#34D399" />
      <stop offset="100%" stop-color="#059669" />
    </linearGradient>
    
    <radialGradient id="shadowGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="rgba(16, 185, 129, 0.25)" />
      <stop offset="100%" stop-color="rgba(16, 185, 129, 0)" />
    </radialGradient>

    <!-- Drop Shadows -->
    <filter id="cardShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="5" stdDeviation="6" flood-color="#000000" flood-opacity="0.12" />
    </filter>
    
    <filter id="treeShadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="6" stdDeviation="5" flood-color="#059669" flood-opacity="0.25" />
    </filter>
  </defs>

  <!-- 1. Kokage (Ground Shadow) -->
  <ellipse cx="95" cy="175" rx="75" ry="14" fill="url(#shadowGrad)" />

  <!-- 2. Trunk (FastAPI Lightning) -->
  <polygon points="105,70 85,130 100,130 90,175 120,115 105,115" fill="#FBBF24" />

  <!-- 3. Canopy (Tree Leaves) -->
  <g filter="url(#treeShadow)" fill="url(#treeGrad)">
    <circle cx="95" cy="55" r="40" />
    <circle cx="60" cy="80" r="30" />
    <circle cx="130" cy="80" r="30" />
    <circle cx="70" cy="110" r="25" />
    <circle cx="120" cy="110" r="25" />
  </g>

  <!-- 4. Background UI Card -->
  <g transform="translate(55, 90) rotate(8)">
    <rect width="80" height="60" rx="6" fill="#F9FAFB" stroke="#E5E7EB" stroke-width="1.5" />
    <line x1="10" y1="15" x2="40" y2="15" stroke="#D1D5DB" stroke-width="4" stroke-linecap="round" />
    <line x1="10" y1="25" x2="70" y2="25" stroke="#E5E7EB" stroke-width="3" stroke-linecap="round" />
    <line x1="10" y1="35" x2="50" y2="35" stroke="#E5E7EB" stroke-width="3" stroke-linecap="round" />
  </g>

  <!-- 5. Foreground UI Card (kokage-ui layout) -->
  <g transform="translate(35, 105)">
    <rect width="85" height="65" rx="6" fill="#FFFFFF" filter="url(#cardShadow)" />
    
    <!-- Browser Dots -->
    <circle cx="12" cy="12" r="3" fill="#EF4444" />
    <circle cx="20" cy="12" r="3" fill="#FBBF24" />
    <circle cx="28" cy="12" r="3" fill="#10B981" />
    
    <!-- Header Divider -->
    <line x1="0" y1="20" x2="85" y2="20" stroke="#F3F4F6" stroke-width="1" />
    
    <!-- Content (H1 & P) -->
    <rect x="12" y="28" width="45" height="5" rx="2.5" fill="#374151" />
    <rect x="12" y="38" width="60" height="3" rx="1.5" fill="#9CA3AF" />
    <rect x="12" y="45" width="35" height="3" rx="1.5" fill="#9CA3AF" />
    
    <!-- DaisyButton (Primary) -->
    <rect x="12" y="52" width="28" height="8" rx="4" fill="#7C3AED" />
    
    <!-- Daisy Flower Icon -->
    <g transform="translate(70, 52) scale(0.65)">
      <circle cx="0" cy="-4.5" r="3.5" fill="#FFFFFF" stroke="#D1D5DB" stroke-width="0.7"/>
      <circle cx="0" cy="4.5" r="3.5" fill="#FFFFFF" stroke="#D1D5DB" stroke-width="0.7"/>
      <circle cx="-4.5" cy="0" r="3.5" fill="#FFFFFF" stroke="#D1D5DB" stroke-width="0.7"/>
      <circle cx="4.5" cy="0" r="3.5" fill="#FFFFFF" stroke="#D1D5DB" stroke-width="0.7"/>
      <circle cx="-3.5" cy="-3.5" r="3.5" fill="#FFFFFF" stroke="#D1D5DB" stroke-width="0.7"/>
      <circle cx="3.5" cy="3.5" r="3.5" fill="#FFFFFF" stroke="#D1D5DB" stroke-width="0.7"/>
      <circle cx="-3.5" cy="3.5" r="3.5" fill="#FFFFFF" stroke="#D1D5DB" stroke-width="0.7"/>
      <circle cx="3.5" cy="-3.5" r="3.5" fill="#FFFFFF" stroke="#D1D5DB" stroke-width="0.7"/>
      <circle cx="0" cy="0" r="3.5" fill="#FBBF24" />
    </g>
  </g>

  <!-- 6. Typography -->
  <g transform="translate(190, 115)">
    <!-- Main Title -->
    <text font-family="'Inter', system-ui, -apple-system, sans-serif" font-size="64" font-weight="800" letter-spacing="-0.03em">
      <tspan fill="#1F2937">kokage</tspan><tspan fill="#059669">-ui</tspan>
    </text>
    
    <!-- Subtitle -->
    <text x="5" y="35" font-family="'Inter', system-ui, -apple-system, sans-serif" font-size="18" font-weight="500" fill="#6B7280" letter-spacing="-0.01em">
      FastAPI + htmx + DaisyUI in Pure Python
    </text>
    
    <!-- Tech Stack Color Accents -->
    <rect x="5" y="55" width="22" height="4" rx="2" fill="#059669" />  <!-- FastAPI Teal -->
    <rect x="33" y="55" width="22" height="4" rx="2" fill="#3B82F6" />  <!-- htmx Blue -->
    <rect x="61" y="55" width="22" height="4" rx="2" fill="#1ACC81" />  <!-- DaisyUI Emerald -->
    <rect x="89" y="55" width="22" height="4" rx="2" fill="#3776AB" />  <!-- Python Blue -->
    <rect x="117" y="55" width="22" height="4" rx="2" fill="#F59E0B" />  <!-- Python Yellow -->
  </g>
</svg>
