<!DOCTYPE html>
<html lang="ja" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <style>body { padding: 1rem; background: transparent; }</style>
</head>
<body>
<div><div class="collapse bg-base-200 collapse-arrow"><input type="radio" name="accordion" checked /><div class="collapse-title text-xl font-medium">What is kokage-ui?</div><div class="collapse-content"><p>A Python library for building UIs with FastAPI.</p></div></div><div class="collapse bg-base-200 collapse-arrow"><input type="radio" name="accordion" /><div class="collapse-title text-xl font-medium">How does it work?</div><div class="collapse-content"><p>It uses htmx and DaisyUI under the hood.</p></div></div><div class="collapse bg-base-200 collapse-arrow"><input type="radio" name="accordion" /><div class="collapse-title text-xl font-medium">Is it free?</div><div class="collapse-content"><p>Yes, it is open source.</p></div></div></div>
<script>
// Notify parent of content height for iframe auto-resize
function notifyHeight() {
  var h = document.documentElement.scrollHeight;
  window.parent.postMessage({ type: "kokage-resize", height: h }, "*");
}
window.addEventListener("load", notifyHeight);
new ResizeObserver(notifyHeight).observe(document.body);
</script>
</body>
</html>
