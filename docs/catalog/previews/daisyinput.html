<!DOCTYPE html>
<html lang="ja" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <style>body { padding: 1rem; background: transparent; }</style>
</head>
<body>
<div class="flex flex-col gap-4 max-w-sm"><div class="form-control w-full"><label class="label"><span class="label-text">Username</span></label><input type="text" name="username" placeholder="Enter username" class="input w-full input-bordered" /></div><div class="form-control w-full"><label class="label"><span class="label-text">Email</span></label><input type="email" name="email" placeholder="you@example.com" class="input w-full input-bordered" /></div></div>
<script>
// Notify parent of content height for iframe auto-resize (with loop guard)
var _lastH = 0;
function notifyHeight() {
  var h = document.body.scrollHeight;
  if (h !== _lastH) {
    _lastH = h;
    window.parent.postMessage({ type: "kokage-resize", height: h }, "*");
  }
}
window.addEventListener("load", notifyHeight);
</script>
</body>
</html>
