<!DOCTYPE html>
<html lang="ja" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <style>body { padding: 1rem; background: transparent; }</style>
</head>
<body>
<video controls width="320" style="background:#eee;min-height:180px;"></video>
<script>
// Notify parent of content height for iframe auto-resize
function notifyHeight() {
  var h = document.documentElement.scrollHeight;
  window.parent.postMessage({ type: "kokage-resize", height: h }, "*");
}
window.addEventListener("load", notifyHeight);
new ResizeObserver(notifyHeight).observe(document.body);
</script>
</body>
</html>
