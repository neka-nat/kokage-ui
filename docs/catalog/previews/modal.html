<!DOCTYPE html>
<html lang="ja" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <style>body { padding: 1rem; background: transparent; }</style>
</head>
<body>
<div><button onclick="document.getElementById(&#39;demo-modal&#39;).showModal()" class="btn btn-primary">Open Modal</button><dialog id="demo-modal" class="modal"><div class="modal-box"><h3 class="font-bold text-lg">Modal Title</h3><p>This is the modal content.</p><div class="modal-action"><button class="btn btn">Close</button></div></div><form method="dialog" class="modal-backdrop"></form></dialog></div>
<script>
// Notify parent of content height for iframe auto-resize (with loop guard)
var _lastH = 0;
function notifyHeight() {
  var h = document.body.scrollHeight;
  if (h !== _lastH) {
    _lastH = h;
    window.parent.postMessage({ type: "kokage-resize", height: h }, "*");
  }
}
window.addEventListener("load", notifyHeight);
</script>
</body>
</html>
