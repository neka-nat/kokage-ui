site_name: kokage-ui
site_description: Add htmx + DaisyUI based UI to FastAPI with pure Python
site_url: https://neka-nat.github.io/kokage-ui/
repo_url: https://github.com/neka-nat/kokage-ui
repo_name: neka-nat/kokage-ui

theme:
  name: material
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - content.code.copy
    - search.suggest
    - search.highlight
  palette:
    - scheme: default
      primary: teal
      accent: amber
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: teal
      accent: amber
      toggle:
        icon: material/brightness-4
        name: Switch to light mode

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.snippets
  - attr_list
  - md_in_html
  - tables

extra_javascript:
  - catalog/iframe-resize.js

nav:
  - Home: index.md
  - Getting Started: getting-started.md
  - Guide:
    - HTML Elements: guide/elements.md
    - DaisyUI Components: guide/components.md
    - Pages & Layout: guide/pages.md
    - Pydantic Models: guide/models.md
    - CRUD: guide/crud.md
    - SQL Storage: guide/storage.md
    - DataGrid: guide/datagrid.md
    - Admin Dashboard: guide/admin.md
    - Auth: guide/auth.md
    - Theme: guide/theme.md
    - Notifications: guide/notifications.md
    - htmx Patterns: guide/htmx.md
    - Streaming Chat: guide/chat.md
    - Agent View: guide/agent.md
  - Examples:
    - Hello World: examples/hello.md
    - Todo App: examples/todo.md
    - Dashboard: examples/dashboard.md
    - Admin Demo: examples/admin_demo.md
    - Blog App: examples/blog.md
    - Real-time: examples/realtime.md
    - Chat Demo: examples/chat_demo.md
    - Agent Demo: examples/agent_demo.md
    - Chart Demo: examples/chart_demo.md
    - Auth Demo: examples/auth_demo.md
  - Component Catalog:
    - Overview: catalog/index.md
    - HTML Elements: catalog/elements.md
    - DaisyUI Components: catalog/components.md
    - Field Components: catalog/fields.md
    - htmx Patterns: catalog/htmx.md
    - Model Components: catalog/models.md
    - Features: catalog/features.md
  - API Reference: api/reference.md
